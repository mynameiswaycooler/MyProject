<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Корзина</title>
    <link rel="stylesheet" href="../css/styles2.css">
    <link rel="stylesheet" href="../css/cart.css">
</head>
<body>
<div class="site-container">
    <header>
        <div class="header-content">
            <div class="h-left">
                <div class="logo"><img src="../images/icon.webp" alt="лого" class="circle" /></div>
                <a href="../index.html" class="title">Цитрус</a>
                <div class="filter"><img src="../images/temp.png" alt="фильтр" class="icon" /></div>
            </div>
            <div class="h-right">
                <div class="cart"><img src="../images/socool.webp" alt="корзина" class="icon" /></div>
                <div class="nav"><a href="#">Нав1</a><a href="#">Нав2</a><a href="#">Нав3</a></div>
                <div class="user"><img src="../images/help.bmp" alt="иконка" class="circle" /></div>
                <button class="more">Ещё <img src="../images/lpfd.webp" alt="v" class="small-icon" /></button>
            </div>
        </div>
    </header>

    <main>
        <section class="cart-page">
            <h1>Корзина</h1>
            <div class="cart-p">
                <p id="cart-subtotal">[Подытог цен]</p>
                <a href="#" id="checkout-btn" class="checkout-btn">[Оформить заказ]</a>
            </div>
            <div id="cart-items-container">
                <template id="cart-item-template">
                    <div class="cart-item">
                        <button class="remove-btn">✕</button>
                        <img src="" alt="" class="cart-item-img" />
                        <div class="cart-item-details">
                            <h3 class="cart-item-title"></h3>
                            <p class="cart-item-description"></p>
                            <p class="cart-item-price-per-unit"></p>
                        </div>
                        <div class="cart-item-quantity-controls">
                            <button class="q-btn minus">-</button>
                            <span class="q-display">0</span>
                            <button class="q-btn plus">+</button>
                        </div>
                        <p class="cart-item-total-price"></p>
                    </div>
                </template>
                <div id="empty-cart-message" style="display: none; text-align: center; margin: 40px 0;">
                    ##Здесь пустое место
                </div>
            </div>
            
        </section>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-left">
                <div class="logo"><img src="../images/icon.webp" alt="лого" class="circle" /></div>
                <span class="footer-copy">&copy; 2026 Цитрус</span>
            </div>
            <div class="footer-right">
                <a href="#">О нас</a>
                <a href="#">Контакты</a>
            </div>
        </div>
    </footer>
    <script src="../script/cart.js"></script>
</div>
</body>
</html>
