<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Оформление заказа - Цитрус</title>
    <link rel="stylesheet" href="../css/styles2.css">
    <link rel="stylesheet" href="../css/checkout.css">
</head>
<body>
<div class="site-container">
    <header>
        <div class="header-content">
            <div class="h-left">
                <div class="logo"><img src="../images/icon.webp" alt="лого" class="circle" id="019ed843-f65a-7b32-86fa-d97a59d33f55" /></div>
                <a href="../index.html" class="title">Цитрус</a>
                <div class="filter"><img src="../images/temp.png" alt="фильтр" class="icon" /></div>
            </div>
            <div class="h-right">
                <div class="cart active"><img src="../images/socool.webp" alt="корзина" class="icon" id="019ed843-fe2a-731d-8f19-8418717f6854" /></div>
                <div class="nav"><a href="#">Нав1</a><a href="#">Нав2</a><a href="#">Нав3</a></div>
                <div class="user"><img src="../images/help.bmp" alt="иконка" class="circle" id="019ed844-020b-7453-8923-472840fb2044" /></div>
                <button class="more">Ещё <img src="../images/lpfd.webp" alt="v" class="small-icon" id="019ed844-0228-795e-8b38-d898a2bd309d" /></button>
            </div>
        </div>
    </header>

    <main>
        <section class="checkout-page">
            <h1>Оформление заказа</h1>

            <div class="checkout-grid">
                <div class="checkout-form">
                    <div class="checkout-section">
                        <h2 class="section-title">Контактная информация</h2>
                        <form id="order-form">
                            <div class="form-group">
                                <div class="icon-input"><img alt="Имя" /></div>
                                <input type="text" id="name" class="input-field" placeholder="Ваше имя" required />
                            </div>
                            <div class="form-group">
                                <div class="icon-input"><img alt="Телефон" /></div>
                                <input type="tel" id="phone" class="input-field" placeholder="+7 (___) ___-__-__" required />
                            </div>
                            <div class="form-group">
                                <div class="icon-input"><img alt="Email" /></div>
                                <input type="email" id="email" class="input-field" placeholder="Ваша почта" required />
                            </div>
                        </form>
                    </div>

                    <div class="checkout-section">
                        <h2 class="section-title">Адрес доставки</h2>
                        <form id="address-form">
                            <div class="form-group">
                                <div class="icon-input"><img src="../images/map_icon.png" alt="Город" /></div>
                                <input type="text" id="city" class="input-field" placeholder="Город" required />
                            </div>
                            <div class="form-group">
                                <div class="icon-input"><img alt="Улица" /></div>
                                <input type="text" id="street" class="input-field" placeholder="Улица, дом, квартира" required />
                            </div>
                            <div class="form-group">
                                <div class="icon-input"><img alt="Время" /></div>
                                <input type="text" id="time" class="input-field" placeholder="Желаемое время доставки" />
                            </div>
                        </form>
                    </div>

                    <button form="order-form" formnovalidate type="submit" class="submit-btn">Подтвердить заказ</button>
                </div>

                <aside class="summary-box">
                    <h2 class="section-title">Итог к оплате</h2>
                    <p class="summary-total">[Сумма из корзины]</p>
                </aside>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-left">
                <div class="logo"><img src="../images/icon.webp" alt="лого" class="circle" /></div>
                <span class="footer-copy">&copy; 2026 Цитрус</span>
            </div>
            <div class="footer-right">
                <a href="#">О нас</a>
                <a href="#">Контакты</a>
            </div>
        </div>
    </footer>

</div>

<script>
    document.getElementById('order-form').addEventListener('submit', function(event) {
        event.preventDefault();

        const data = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            city: document.getElementById('city').value,
            street: document.getElementById('street').value,
            time: document.getElementById('time').value
        };

        console.log("Данные заказа:", data);
        alert("Заказ успешно оформлен!");
    });
</script>
</body>
</html>
